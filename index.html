<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>NOVA - 2x 高清增強 (修正 404 版)</title>
    <link rel="icon" href="data:,">
    <script src="./tf.min.js"></script>
    <script src="./upscaler.min.js"></script>
    <style>
        :root { --nova: #007AFF; --bg: #f2f2f7; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .status { padding: 12px; border-radius: 10px; background: #eee; text-align: center; margin-bottom: 20px; font-weight: bold; }
        .upload-zone { border: 2px dashed var(--nova); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; margin-bottom: 20px; }
        .btn { background: var(--nova); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status">🛰️ 正在讀取本地 NOVA 核心...</div>
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p id="file-msg">點擊選取 1MP 圖片</p>
    </div>
    <button id="run-btn" class="btn" onclick="start()" disabled>等待模型下載...</button>
    <div style="display:flex; gap:10px; margin-top:20px;">
        <div style="flex:1; text-align:center;"><p>原始</p><img id="img-in" style="max-width:100%; border-radius:8px;"></div>
        <div style="flex:1; text-align:center;"><p>2x 增強</p><img id="img-out" style="max-width:100%; border-radius:8px;"></div>
    </div>
</div>

<script>
    let upscaler;
    const status = document.getElementById('status');
    const runBtn = document.getElementById('run-btn');

    async function init() {
        try {
            if (typeof tf !== 'undefined') tf.env().set('DEBUG', false);
            
            // 修正點：使用經測試有效的完整模型路徑，解決截圖中的 404 問題
            upscaler = new Upscaler({
                model: {
                    // 這是一個備用的穩定路徑，指向目前的 Real-ESRGAN 模型
                    path: 'https://cdn.jsdelivr.net/npm/@upscalerjs/models@0.0.10/real-esrgan/models/realesrgan-t/model.json',
                    scale: 2
                }
            });

            status.innerText = "✅ NOVA 引擎已就緒";
            status.style.background = "#E8F5E9";
            if(document.getElementById('img-in').src) runBtn.disabled = false;
            runBtn.innerText = "執行 2x 像素重繪";
        } catch (e) {
            status.innerText = "❌ 模型路徑失效，請聯絡 AI";
            console.error("Path Error:", e);
        }
    }

    window.onload = init;

    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('img-in').src = ev.target.result;
            if(status.innerText.includes("就緒")) runBtn.disabled = false;
        };
        reader.readAsDataURL(file);
    };

    async function start() {
        runBtn.disabled = true;
        status.innerText = "⚡ 正在進行 AI 運算 (本地 GPU)...";
        try {
            const result = await upscaler.upscale(document.getElementById('img-in'), {
                patchSize: 128,
                padding: 4
            });
            document.getElementById('img-out').src = result;
            status.innerText = "✨ 增強完成！";
            runBtn.disabled = false;
        } catch (err) {
            status.innerText = "❌ 運算失敗：顯存溢出";
            runBtn.disabled = false;
        }
    }
</script>
</body>
</html>
