<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - 強制 2x 高清引擎 (穩定版)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.0.56/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/real-esrgan@0.0.10/dist/umd/realesrgan-t.min.js"></script>

    <style>
        :root { --nova: #007AFF; --bg: #f5f5f7; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .nova-card { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 50px rgba(0,0,0,0.1); }
        .status-bar { padding: 8px 15px; border-radius: 50px; font-size: 13px; background: #eee; margin-bottom: 20px; display: inline-block; font-weight: 500; }
        .upload-area { border: 2px dashed var(--nova); padding: 40px; text-align: center; border-radius: 18px; cursor: pointer; background: rgba(0,122,255,0.02); margin: 20px 0; }
        .btn-action { background: var(--nova); color: white; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-action:disabled { background: #d1d1d6; cursor: not-allowed; }
        .preview-flex { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .view-item { flex: 1; min-width: 250px; text-align: center; }
        .view-item img { max-width: 100%; border-radius: 12px; border: 1px solid #ddd; }
        #p-zone { margin: 20px 0; display: none; }
        .bar-outer { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        #bar { background: var(--nova); width: 0%; height: 100%; transition: width 0.1s; }
    </style>
</head>
<body>

<div class="nova-card">
    <div id="engine-tag" class="status-bar">🛰️ 正在連線至 AI 衛星庫...</div>
    <h1>NOVA <span style="font-weight: 300;">2x Super Res</span></h1>
    
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p id="file-label">點擊選取 AI 生成圖片</p>
    </div>

    <button id="run-btn" class="btn-action" onclick="startForceUpscale()" disabled>載入中...</button>

    <div id="p-zone">
        <div id="p-msg" style="font-size: 14px;">像素重構中...</div>
        <div class="bar-outer"><div id="bar"></div></div>
    </div>

    <div class="preview-flex">
        <div class="view-item">
            <p>原始</p>
            <img id="img-in" src="">
            <div id="px-in" style="font-size:12px; margin-top:5px;">--</div>
        </div>
        <div class="view-item">
            <p style="color:var(--nova)">NOVA 輸出</p>
            <img id="img-out" src="">
            <div id="px-out" style="font-size:12px; margin-top:5px; color:var(--nova)">--</div>
        </div>
    </div>
</div>

<script>
    let upscaler;
    const runBtn = document.getElementById('run-btn');
    const engineTag = document.getElementById('engine-tag');
    const fileInput = document.getElementById('file-input');
    const imgIn = document.getElementById('img-in');
    const imgOut = document.getElementById('img-out');

    // --- 關鍵修正：循環檢查函式庫是否加載 ---
    function checkLibraries() {
        if (typeof Upscaler !== 'undefined' && typeof tf !== 'undefined') {
            initModel();
        } else {
            console.log("正在等待函式庫下載...");
            setTimeout(checkLibraries, 500); // 每 0.5 秒檢查一次
        }
    }

    async function initModel() {
        try {
            engineTag.innerText = "⏳ 模型權重下載中 (約 20MB)...";
            // 初始化 Upscaler
            upscaler = new Upscaler({ model: RealESRGANT });
            // 預熱模型
            await upscaler.warmup({ patchSize: 128 });
            
            engineTag.innerText = "✅ NOVA 引擎已就緒";
            engineTag.style.background = "#E3F2FD";
            runBtn.innerText = "執行 2x 放大";
            if(imgIn.src) runBtn.disabled = false;
        } catch (e) {
            engineTag.innerText = "❌ 模型加載出錯，請檢查網路";
            console.error(e);
        }
    }

    // 啟動監測
    checkLibraries();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            imgIn.src = ev.target.result;
            imgIn.onload = () => {
                document.getElementById('px-in').innerText = `${imgIn.naturalWidth} x ${imgIn.naturalHeight}`;
                if(engineTag.innerText.includes("就緒")) runBtn.disabled = false;
            };
        };
        reader.readAsDataURL(file);
    };

    async function startForceUpscale() {
        runBtn.disabled = true;
        document.getElementById('p-zone').style.display = 'block';
        const bar = document.getElementById('bar');
        
        try {
            const result = await upscaler.upscale(imgIn, {
                patchSize: 128,
                padding: 4,
                progress: (p) => {
                    bar.style.width = Math.round(p * 100) + '%';
                }
            });

            imgOut.src = result;
            imgOut.onload = () => {
                document.getElementById('px-out').innerText = `${imgOut.naturalWidth} x ${imgOut.naturalHeight}`;
                runBtn.disabled = false;
            };
        } catch (err) {
            alert("運算失敗，圖片可能太大或記憶體不足。");
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
