<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - 2x 高清影像增強</title>
    <link rel="icon" href="data:,"> <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.0.56/dist/browser/umd/upscaler.min.js"></script>

    <style>
        :root { --nova: #007AFF; --success: #34C759; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
        .status-box { padding: 12px; border-radius: 12px; background: #eee; font-size: 14px; text-align: center; margin-bottom: 20px; font-weight: 600; }
        .upload-area { border: 2px dashed var(--nova); padding: 40px; text-align: center; border-radius: 18px; cursor: pointer; background: #f8fbff; margin-bottom: 20px; }
        .btn { background: var(--nova); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #d1d1d6; cursor: not-allowed; }
        .progress-bar-bg { background: #e5e5ea; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 20px; display: none; }
        .progress-bar-fill { background: linear-gradient(90deg, #007AFF, #5856D6); width: 0%; height: 100%; }
        .result-container { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .img-box { flex: 1; min-width: 280px; text-align: center; }
        .img-box img { max-width: 100%; border-radius: 12px; border: 1px solid #ddd; background: #fafafa; }
        .px-tag { display: inline-block; margin-top: 10px; font-size: 12px; background: #333; color: #fff; padding: 3px 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-box">🛰️ 正在連線 NOVA AI 衛星...</div>
    <h2 style="margin:0 0 10px 0;">NOVA <span style="font-weight:300;">Super-Resolution</span></h2>

    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p id="file-msg" style="margin:0; font-size:16px;">點擊選取圖片 或 拖放至此</p>
    </div>

    <button id="run-btn" class="btn" onclick="startUpscale()" disabled>等待模型下載中...</button>

    <div class="progress-bar-bg" id="p-bg">
        <div class="progress-bar-fill" id="p-fill"></div>
    </div>

    <div class="result-container">
        <div class="img-box">
            <p style="font-size:13px; color:#888;">原始 (1MP)</p>
            <img id="img-in" src="">
            <div id="px-in" class="px-tag">0 x 0</div>
        </div>
        <div class="img-box">
            <p style="font-size:13px; color:var(--nova);">高清 (4MP)</p>
            <img id="img-out" src="">
            <div id="px-out" class="px-tag" style="background:var(--nova)">0 x 0</div>
        </div>
    </div>

    <div id="dl-box" style="margin-top: 25px; text-align: center; display: none;">
        <a id="dl-link" download="NOVA_4MP.png">
            <button class="btn" style="background:var(--success); width: auto; padding: 14px 60px;">💾 保存圖片</button>
        </a>
    </div>
</div>

<script>
    let upscaler;
    const status = document.getElementById('status');
    const runBtn = document.getElementById('run-btn');
    const fileInput = document.getElementById('file-input');
    const imgIn = document.getElementById('img-in');
    const imgOut = document.getElementById('img-out');

    // 核心初始化
    async function initEngine() {
        try {
            if (typeof tf !== 'undefined') tf.env().set('DEBUG', false);
            status.innerText = "⏳ 找到組件，正在請求 20MB 數據檔...";
            
            // 使用備援路徑
            upscaler = new Upscaler({
                model: {
                    path: 'https://unpkg.com/@upscalerjs/real-esrgan@0.0.10/models/realesrgan-t/model.json',
                    scale: 2
                }
            });

            // 跳過長時間的 warmup，直接讓按鈕變可用
            status.innerText = "✅ NOVA 引擎已就緒";
            status.style.background = "#E8F5E9";
            if(imgIn.src) runBtn.disabled = false;
            runBtn.innerText = "執行 2x 像素重繪";

        } catch (e) {
            status.innerText = "❌ 請求被攔截，請嘗試切換網路";
            console.error(e);
        }
    }

    // 監測機制
    let checkTimer = 0;
    const monitor = setInterval(() => {
        checkTimer++;
        if (typeof tf !== 'undefined' && typeof Upscaler !== 'undefined') {
            clearInterval(monitor);
            initEngine();
        } else if (checkTimer > 60) { // 延長到 30 秒
            clearInterval(monitor);
            status.innerText = "⚠ 衛星連線超時，請檢查防火牆或換手機測試";
        } else {
            status.innerText = `📡 偵測組件中 (${Math.round(checkTimer/2)}s)...`;
        }
    }, 500);

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            imgIn.src = ev.target.result;
            imgIn.onload = () => {
                document.getElementById('px-in').innerText = `${imgIn.naturalWidth} x ${imgIn.naturalHeight}`;
                if(status.innerText.includes("就緒")) runBtn.disabled = false;
            };
        };
        reader.readAsDataURL(file);
    };

    async function startUpscale() {
        runBtn.disabled = true;
        document.getElementById('p-bg').style.display = 'block';
        const pFill = document.getElementById('p-fill');
        status.innerText = "⚡ 正在本地運算... 第一次運算可能較久";

        try {
            const result = await upscaler.upscale(imgIn, {
                patchSize: 128,
                padding: 4,
                progress: (p) => { pFill.style.width = Math.round(p * 100) + '%'; }
            });

            imgOut.src = result;
            imgOut.onload = () => {
                document.getElementById('px-out').innerText = `${imgOut.naturalWidth} x ${imgOut.naturalHeight}`;
                status.innerText = "✨ 增強完成！";
                document.getElementById('dl-link').href = result;
                document.getElementById('dl-box').style.display = 'block';
                runBtn.disabled = false;
            };
        } catch (err) {
            status.innerText = "❌ 顯存溢出，請換一張小一點的圖";
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
