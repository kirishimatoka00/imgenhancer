<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>NOVA - 100% 本地高清增強</title>
    <script src="./tf.min.js"></script>
    <script src="./upscaler.min.js"></script>
</head>
<body>
    <div id="status" style="padding:10px; background:#eee;">🛰️ 正在讀取本地檔案...</div>
    <input type="file" id="file-input">
    <button id="run-btn" onclick="start()" disabled>執行 2x 增強</button>
    <hr>
    <img id="img-in" style="max-width:300px; display:none;">
    <img id="img-out" style="max-width:100%;">

<script>
    let upscaler;
    const status = document.getElementById('status');
    const runBtn = document.getElementById('run-btn');

    async function init() {
        try {
            // 核心修正：強制指向本地，不再連網路
            upscaler = new Upscaler({
                model: {
                    path: './model.json',
                    scale: 2
                }
            });
            status.innerText = "✅ NOVA 引擎已就緒 (離線模式)";
            status.style.background = "#E8F5E9";
        } catch (e) {
            status.innerText = "❌ 讀取失敗，請確認 5 個檔案都在同資料夾";
        }
    }
    window.onload = init;

    document.getElementById('file-input').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById('img-in').src = ev.target.result;
            runBtn.disabled = false;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    async function start() {
        status.innerText = "⚡ 本地 AI 像素計算中...";
        const result = await upscaler.upscale(document.getElementById('img-in'));
        document.getElementById('img-out').src = result;
        status.innerText = "✨ 增強完成！";
    }
</script>
</body>
</html>
