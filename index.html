<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - 強制 2x 高清引擎</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.0.56/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/real-esrgan@0.0.10/dist/umd/realesrgan-t.min.js"></script>

    <style>
        :root { --nova: #007AFF; --bg: #f5f5f7; }
        body { font-family: system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .nova-card { width: 100%; max-width: 900px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 50px rgba(0,0,0,0.1); }
        .status-bar { padding: 8px 15px; border-radius: 50px; font-size: 13px; background: #eee; margin-bottom: 20px; display: inline-block; font-weight: 500; }
        .upload-area { border: 2px dashed var(--nova); padding: 40px; text-align: center; border-radius: 18px; cursor: pointer; background: rgba(0,122,255,0.02); transition: 0.3s; }
        .upload-area:hover { background: rgba(0,122,255,0.08); }
        .btn-action { background: var(--nova); color: white; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 15px; }
        .btn-action:disabled { background: #d1d1d6; cursor: not-allowed; }
        .progress-zone { margin: 25px 0; display: none; }
        .bar-outer { background: #e5e5ea; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        .bar-inner { background: linear-gradient(90deg, #007AFF, #5856D6); width: 0%; height: 100%; transition: width 0.1s; }
        .preview-flex { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .view-item { flex: 1; min-width: 300px; text-align: center; border: 1px solid #eee; padding: 10px; border-radius: 12px; }
        .view-item img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .info-tag { font-size: 12px; color: #fff; background: #333; padding: 3px 10px; border-radius: 6px; margin-top: 8px; display: inline-block; }
    </style>
</head>
<body>

<div class="nova-card">
    <div id="engine-tag" class="status-bar">⏳ 正在同步 NOVA AI 模型...</div>
    <h1 style="margin: 10px 0;">NOVA <span style="font-weight: 300;">2x Upscaler</span></h1>
    
    <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p id="file-label" style="font-size: 18px; color: #555;">點擊或拖入圖片</p>
        <span style="font-size: 13px; color: #888;">支援 JPEG, PNG, WebP (自動強制 200% 放大)</span>
    </div>

    <button id="run-btn" class="btn-action" onclick="startForceUpscale()" disabled>請先載入模型</button>

    <div class="progress-zone" id="p-zone">
        <div id="p-msg" style="font-size: 14px; font-weight: 600;">AI 運算中...</div>
        <div class="bar-outer"><div id="bar" class="bar-inner"></div></div>
    </div>

    <div class="preview-flex">
        <div class="view-item">
            <p style="font-weight: 600;">原始來源</p>
            <img id="img-in" src="">
            <br><span id="px-in" class="info-tag">0 x 0</span>
        </div>
        <div class="view-item" style="border-color: var(--nova);">
            <p style="font-weight: 600; color: var(--nova);">2x 高清輸出</p>
            <img id="img-out" src="">
            <br><span id="px-out" class="info-tag" style="background: var(--nova);">0 x 0</span>
        </div>
    </div>

    <div id="dl-wrap" style="text-align: center; margin-top: 30px; display: none;">
        <a id="dl-btn" download="NOVA_SuperRes_2x.png">
            <button class="btn-action" style="background: #34C759; width: auto; padding: 15px 50px;">💾 保存 400 萬畫素圖片</button>
        </a>
    </div>
</div>

<script>
    let upscaler;
    const fileInput = document.getElementById('file-input');
    const runBtn = document.getElementById('run-btn');
    const imgIn = document.getElementById('img-in');
    const imgOut = document.getElementById('img-out');
    const engineTag = document.getElementById('engine-tag');

    // 1. 初始化與預熱 (解決「沒反應」的關鍵)
    window.onload = async () => {
        try {
            upscaler = new Upscaler({ model: RealESRGANT });
            await upscaler.warmup({ patchSize: 128 });
            engineTag.innerText = "✅ NOVA 高清引擎就緒";
            engineTag.style.background = "#E3F2FD";
            engineTag.style.color = "#007AFF";
            runBtn.innerText = "執行強制 2x 放大";
        } catch (e) {
            engineTag.innerText = "❌ 模型加載失敗";
            console.error(e);
        }
    };

    // 2. 選取圖片預覽與尺寸分析
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            imgIn.src = ev.target.result;
            imgIn.onload = () => {
                // 顯示原始實體像素
                document.getElementById('px-in').innerText = `${imgIn.naturalWidth} x ${imgIn.naturalHeight}`;
                runBtn.disabled = false;
                document.getElementById('file-label').innerText = `已載入: ${file.name}`;
            };
        };
        reader.readAsDataURL(file);
        imgOut.src = "";
        document.getElementById('dl-wrap').style.display = "none";
    };

    // 3. 強制 2x 放大邏輯
    async function startForceUpscale() {
        if (!upscaler) return;

        runBtn.disabled = true;
        document.getElementById('p-zone').style.display = 'block';
        const pMsg = document.getElementById('p-msg');
        const bar = document.getElementById('bar');

        try {
            // 自動計算目標尺寸
            const targetW = imgIn.naturalWidth * 2;
            const targetH = imgIn.naturalHeight * 2;
            pMsg.innerText = `正在重繪像素至 ${targetW} x ${targetH}...`;

            const result = await upscaler.upscale(imgIn, {
                patchSize: 128,
                padding: 4,
                progress: (p) => {
                    let pct = Math.round(p * 100);
                    bar.style.width = pct + '%';
                    pMsg.innerText = `AI 重構中: ${pct}%`;
                }
            });

            // 寫入結果
            imgOut.src = result;
            imgOut.onload = () => {
                document.getElementById('px-out').innerText = `${imgOut.naturalWidth} x ${imgOut.naturalHeight}`;
                pMsg.innerText = "✨ 2x 增強成功！";
                document.getElementById('dl-btn').href = result;
                document.getElementById('dl-wrap').style.display = 'block';
                runBtn.disabled = false;
            };

        } catch (err) {
            pMsg.innerText = "❌ 錯誤：圖片過大導致瀏覽器記憶體溢出";
            console.error(err);
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
