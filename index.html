<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>NOVA - 本地高清增強 (Final)</title>
    <script src="./tf.min.js"></script>
    <script src="./upscaler.min.js"></script>
</head>
<body>
    <div id="status">⏳ 正在載入本地 AI 權重...</div>
    <input type="file" id="file-input">
    <button id="run-btn" disabled>執行增強</button>
    <img id="img-out">

    <script>
        let upscaler;
        const status = document.getElementById('status');

        async function init() {
            try {
                // 核心：直接讀取你 GitHub 上的 model.json
                upscaler = new Upscaler({
                    model: {
                        path: './model.json',
                        scale: 2
                    }
                });
                status.innerText = "✅ NOVA 引擎已就緒 (全本地模式)";
                document.getElementById('run-btn').disabled = false;
            } catch (e) {
                status.innerText = "❌ 找不到本地模型檔案，請確認檔案已上傳";
                console.error(e);
            }
        }
        window.onload = init;

        // ... 其餘處理圖片的邏輯 (跟之前一樣)
    </script>
</body>
</html>
