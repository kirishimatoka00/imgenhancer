<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - 2x 強制高清增強</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.0.56/dist/browser/umd/upscaler.min.js"></script>

    <style>
        :root { --nova: #007AFF; --success: #34C759; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f2f2f7; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .status-box { padding: 12px; border-radius: 12px; background: #eee; font-size: 14px; text-align: center; margin-bottom: 20px; font-weight: 500; }
        .drop-zone { border: 2px dashed var(--nova); padding: 30px; text-align: center; border-radius: 15px; cursor: pointer; background: #f8fbff; margin-bottom: 20px; }
        .btn { background: var(--nova); color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #d1d1d6; cursor: not-allowed; }
        .progress-bar-bg { background: #e5e5ea; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 15px; display: none; }
        .progress-bar-fill { background: var(--nova); width: 0%; height: 100%; transition: width 0.1s; }
        .result-container { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        .img-box { flex: 1; min-width: 280px; text-align: center; }
        .img-box img { max-width: 100%; border-radius: 10px; border: 1px solid #ddd; }
        .px-tag { display: inline-block; margin-top: 8px; font-size: 12px; background: #333; color: #fff; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" class="status-box">🛰️ 正在初始化 NOVA AI 模組...</div>
    <h2 style="margin-top:0;">NOVA <span style="font-weight:300;">Super-Resolution</span></h2>

    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p id="file-msg">點擊選取或拖放圖片</p>
    </div>

    <button id="run-btn" class="btn" onclick="startUpscale()" disabled>請先載入模型</button>

    <div class="progress-bar-bg" id="p-bg">
        <div class="progress-bar-fill" id="p-fill"></div>
    </div>

    <div class="result-container">
        <div class="img-box">
            <p>原始輸入</p>
            <img id="img-in" src="">
            <div id="px-in" class="px-tag">0 x 0</div>
        </div>
        <div class="img-box">
            <p style="color:var(--nova)">2x 高清輸出</p>
            <img id="img-out" src="">
            <div id="px-out" class="px-tag" style="background:var(--nova)">0 x 0</div>
        </div>
    </div>

    <div id="dl-box" style="margin-top: 20px; text-align: center; display: none;">
        <a id="dl-link" download="NOVA_Enhanced_2x.png">
            <button class="btn" style="background:var(--success); width: auto; padding: 12px 40px;">💾 下載 400 萬畫素大圖</button>
        </a>
    </div>
</div>

<script>
    let upscaler;
    const status = document.getElementById('status');
    const runBtn = document.getElementById('run-btn');
    const fileInput = document.getElementById('file-input');
    const imgIn = document.getElementById('img-in');
    const imgOut = document.getElementById('img-out');

    // 1. 強制初始化：直接手動指定模型路徑，跳過 npm 套件查找
    async function initNOVAEngine() {
        try {
            status.innerText = "⏳ 正在從雲端下載 AI 權重 (約 20MB)...";
            
            // 關鍵修正：直接手動定義模型位置
            upscaler = new Upscaler({
                model: {
                    path: 'https://unpkg.com/@upscalerjs/real-esrgan@0.0.10/models/realesrgan-t/model.json',
                    scale: 2
                }
            });

            // 預熱模型
            await upscaler.warmup({ patchSize: 128 });
            
            status.innerText = "✅ NOVA 引擎已就緒 (強制 2x 模式)";
            status.style.background = "#E8F5E9";
            if(imgIn.src) runBtn.disabled = false;
            runBtn.innerText = "開始 2x 高清放大";
        } catch (e) {
            status.innerText = "❌ 載入失敗：請確認網路連線或更換瀏覽器";
            console.error(e);
        }
    }

    // 啟動引擎
    initNOVAEngine();

    // 2. 處理檔案讀取
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            imgIn.src = ev.target.result;
            imgIn.onload = () => {
                document.getElementById('px-in').innerText = `${imgIn.naturalWidth} x ${imgIn.naturalHeight}`;
                document.getElementById('file-msg').innerText = `已載入：${file.name}`;
                if(status.innerText.includes("就緒")) runBtn.disabled = false;
            };
        };
        reader.readAsDataURL(file);
    };

    // 3. 執行放大運算
    async function startUpscale() {
        runBtn.disabled = true;
        const pBg = document.getElementById('p-bg');
        const pFill = document.getElementById('p-fill');
        pBg.style.display = 'block';
        status.innerText = "⚡ 正在進行本地 AI 運算，請勿關閉網頁...";

        try {
            // patchSize 128 確保手機端穩定性
            const result = await upscaler.upscale(imgIn, {
                patchSize: 128,
                padding: 4,
                progress: (percent) => {
                    pFill.style.width = Math.round(percent * 100) + '%';
                }
            });

            imgOut.src = result;
            imgOut.onload = () => {
                document.getElementById('px-out').innerText = `${imgOut.naturalWidth} x ${imgOut.naturalHeight}`;
                status.innerText = "✨ 增強完成！";
                document.getElementById('dl-link').href = result;
                document.getElementById('dl-box').style.display = 'block';
                runBtn.disabled = false;
            };
        } catch (err) {
            console.error(err);
            status.innerText = "❌ 運算失敗：可能是圖片太大導致顯存溢出";
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
