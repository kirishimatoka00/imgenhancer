<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - Real-ESRGAN 高清增強 (4MP)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/real-esrgan@latest/dist/umd/realesrgan-t.min.js"></script>

    <style>
        :root { --nova-blue: #007AFF; --nova-bg: #f0f2f5; }
        body { font-family: sans-serif; background: var(--nova-bg); display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 900px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .upload-box { border: 2px dashed #007AFF; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; margin-bottom: 15px; }
        .btn-run { background: #007AFF; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn-run:disabled { background: #ccc; }
        .progress-box { margin: 20px 0; display: none; }
        .bar-bg { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .bar-fill { background: #34C759; width: 0%; height: 100%; transition: width 0.2s; }
        .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .img-container { text-align: center; border: 1px solid #eee; padding: 10px; border-radius: 8px; }
        .img-container img { max-width: 100%; height: auto; border-radius: 4px; background: #fafafa; }
        .pixel-info { display: inline-block; margin-top: 5px; padding: 2px 8px; background: #333; color: white; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>NOVA <span style="font-weight: normal; font-size: 18px;">Real-ESRGAN Engine</span></h1>
        <p>本地 AI 運算：由 100 萬提升至 400 萬畫素</p>
    </div>

    <div class="upload-box" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p id="file-name">點擊此處上傳圖片</p>
    </div>

    <button id="run-btn" class="btn-run" onclick="processImage()" disabled>開始 200% 高清重繪</button>

    <div class="progress-box" id="p-box">
        <div id="status">準備中...</div>
        <div class="bar-bg"><div id="bar" class="bar-fill"></div></div>
    </div>

    <div class="result-grid">
        <div class="img-container">
            <p>原始尺寸</p>
            <img id="orig-view" src="">
            <div id="orig-px" class="pixel-info">0 x 0</div>
        </div>
        <div class="img-container">
            <p>NOVA 強化後 (4MP)</p>
            <img id="up-view" src="">
            <div id="up-px" class="pixel-info" style="background: #34C759;">0 x 0</div>
        </div>
    </div>

    <div id="dl-box" style="margin-top:20px; text-align:center; display:none;">
        <a id="dl-link" download="NOVA_4MP_Enhanced.png">
            <button style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">保存 400 萬畫素圖片</button>
        </a>
    </div>
</div>

<script>
    let upscaler;
    const fileInput = document.getElementById('file-input');
    const runBtn = document.getElementById('run-btn');
    const origView = document.getElementById('orig-view');
    const upView = document.getElementById('up-view');
    const pBox = document.getElementById('p-box');
    const bar = document.getElementById('bar');
    const status = document.getElementById('status');

    // 1. 初始化 Upscaler (確保使用 RealESRGANT 模型)
    upscaler = new Upscaler({
        model: RealESRGANT // 這個模型在瀏覽器中的 2x 縮放最穩定
    });

    // 2. 監聽上傳
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            origView.src = ev.target.result;
            origView.onload = () => {
                document.getElementById('orig-px').innerText = `${origView.naturalWidth} x ${origView.naturalHeight} (1MP級)`;
                runBtn.disabled = false;
                document.getElementById('file-name').innerText = file.name;
            };
        };
        reader.readAsDataURL(file);
    };

    // 3. 核心處理函數
    async function processImage() {
        runBtn.disabled = true;
        pBox.style.display = 'block';
        status.innerText = "NOVA 正在加載 AI 權重...";
        
        try {
            // 強制執行 2x 放大，並使用 patchSize 避免崩潰
            const result = await upscaler.upscale(origView, {
                patchSize: 128, // 關鍵：分塊處理
                padding: 4,
                progress: (p) => {
                    let pct = Math.round(p * 100);
                    bar.style.width = pct + '%';
                    status.innerText = `AI 像素增補中: ${pct}%`;
                }
            });

            upView.src = result;
            upView.onload = () => {
                const w = upView.naturalWidth;
                const h = upView.naturalHeight;
                document.getElementById('up-px').innerText = `${w} x ${h} (${Math.round((w*h)/1000000)}MP)`;
                
                // 確認像素是否有翻倍
                if (w === origView.naturalWidth) {
                    status.innerText = "⚠ 警告：瀏覽器未成功縮放，僅進行了銳化。";
                } else {
                    status.innerText = "✨ 400 萬畫素增強完成！";
                }
                
                document.getElementById('dl-link').href = result;
                document.getElementById('dl-box').style.display = 'block';
                runBtn.disabled = false;
            };

        } catch (err) {
            console.error(err);
            status.innerText = "錯誤：設備記憶體不足，請嘗試較小的圖片。";
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
