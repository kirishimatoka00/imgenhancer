<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA - 高清影像增強器 (4MP)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@latest/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-thick@latest/dist/umd/2x.min.js"></script>

    <style>
        :root {
            --nova-blue: #007AFF;
            --nova-bg: #f5f5f7;
            --nova-card: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--nova-bg);
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--nova-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--nova-blue);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-section {
            border: 2px dashed #ccc;
            padding: 30px;
            text-align: center;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .upload-section:hover {
            border-color: var(--nova-blue);
        }

        button {
            background: var(--nova-blue);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .progress-wrapper {
            margin-top: 20px;
            display: none;
        }

        .progress-bar-bg {
            background: #eee;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 8px;
        }

        #progress-fill {
            background: linear-gradient(90deg, #007AFF, #00C6FF);
            width: 0%;
            height: 100%;
            transition: width 0.1s;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .preview-box {
            text-align: center;
        }

        .preview-box img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: #fafafa;
        }

        .badge {
            background: #eee;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><span style="font-size: 0.8em;">NOVA</span> 影像高清增強模組</h2>
    <p>將 100 萬畫素 AI 生成圖本地升級至 400 萬畫素 (2x 放大)</p>

    <div class="upload-section" id="drop-area">
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <p>點擊或拖放圖片至此</p>
        <button onclick="document.getElementById('file-input').click()">選擇檔案</button>
    </div>

    <button id="run-btn" onclick="startUpscale()" disabled>開始 AI 運算</button>

    <div class="progress-wrapper" id="progress-wrapper">
        <div id="status-text" style="font-weight: bold;">正在載入 AI 模型...</div>
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="preview-grid">
        <div class="preview-box">
            <p>原始圖 <span class="badge" id="orig-size">--</span></p>
            <img id="img-orig" src="" alt="原始圖預覽">
        </div>
        <div class="preview-box">
            <p>NOVA 增強後 <span class="badge" id="up-size">--</span></p>
            <img id="img-up" src="" alt="高清結果預覽">
        </div>
    </div>
    
    <div id="download-area" style="margin-top: 20px; text-align: center; display: none;">
        <a id="download-link" download="NOVA_Upscaled.png">
            <button style="background: #34C759;">下載 4MP 高清圖</button>
        </a>
    </div>
</div>

<script>
    let upscaler;
    const fileInput = document.getElementById('file-input');
    const runBtn = document.getElementById('run-btn');
    const imgOrig = document.getElementById('img-orig');
    const imgUp = document.getElementById('img-up');
    const statusText = document.getElementById('status-text');
    const progressWrapper = document.getElementById('progress-wrapper');
    const progressFill = document.getElementById('progress-fill');
    const downloadArea = document.getElementById('download-area');

    // 1. 初始化 Upscaler
    try {
        upscaler = new Upscaler({
            model: ESRGANThick2x
        });
        console.log("UpscalerJS 已就緒");
    } catch (e) {
        statusText.innerText = "模型載入失敗，請檢查網路連接。";
    }

    // 2. 處理檔案上傳預覽
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imgOrig.src = event.target.result;
                imgOrig.onload = function() {
                    document.getElementById('orig-size').innerText = `${this.naturalWidth} x ${this.naturalHeight}`;
                    runBtn.disabled = false;
                };
            };
            reader.readAsDataURL(file);
            imgUp.src = "";
            downloadArea.style.display = "none";
        }
    });

    // 3. 執行放大
    async function startUpscale() {
        if (!upscaler) return;

        runBtn.disabled = true;
        progressWrapper.style.display = "block";
        statusText.innerText = "NOVA 正在切分影像塊...";
        progressFill.style.width = "0%";

        try {
            // patchSize 是關鍵：避免手機 GPU 溢出
            // 2048x2048 的目標建議用 128
            const upscaledSrc = await upscaler.upscale(imgOrig, {
                patchSize: 128,
                padding: 4,
                progress: (percent) => {
                    let p = Math.round(percent * 100);
                    progressFill.style.width = p + "%";
                    statusText.innerText = `AI 像素重繪中: ${p}%`;
                }
            });

            imgUp.src = upscaledSrc;
            imgUp.onload = function() {
                document.getElementById('up-size').innerText = `${this.naturalWidth} x ${this.naturalHeight}`;
                statusText.innerText = "✨ 增強完成！";
                document.getElementById('download-link').href = upscaledSrc;
                downloadArea.style.display = "block";
                runBtn.disabled = false;
            };

        } catch (error) {
            console.error(error);
            statusText.innerText = "錯誤: 記憶體不足或圖片格式不支援";
            runBtn.disabled = false;
        }
    }
</script>

</body>
</html>
